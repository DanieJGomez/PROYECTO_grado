<!DOCTYPE html>
<html lang="en">
<head>

    <title>Ingrese | Colegio Técnico Jaime Pardo Leal</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
 <link rel="icon" href="{{ url_for('static', filename='ico/logo.ico') }}">
   <link rel="stylesheet" href="{{ url_for('static', filename='css/barra.css') }}">
   <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<header>
    <h1><a href="{{ url_for('home') }}">Colegio Técnico Jaime Pardo Leal </h1>
      <div class="barra">
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('home') }}"><i class='bx bx-home-alt'></i></a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="{{ url_for('login') }}">Iniciar Sesión</a>
        <a href="{{ url_for('login') }}"><i class='bx bxs-key' ></i></a>
      </li> 
      <li>
         <a class="nav-link active" aria-current="page" href="{{ url_for('contactanos') }}">Contáctanos</a>
        <a href="{{ url_for('contactanos') }}"><i class='bx  bxs-envelope'  ></i> </a>
      </li>
      </div>
</header>

<div class="wrapper">
  <form action="{{ url_for('login') }}" method="POST">
    <h1>Login</h1>
    <div class="input-box">
      <input type="email" name="email" placeholder="Correo" required><i class='bx bxs-user'></i>
    </div>
    <div class="input-box">
      <input type="password" name="password" placeholder="password" required><i class='bx bxs-lock' ></i>
    </div>
    <button type="submit" class="btn">Ingresa</button>
    <div class="registrer-link">
      <p>No tiene una cuenta? <a href="{{ url_for('registro') }}">Registrate</a></p>
    </div>
  </form>
</div>

</body>
</html>
