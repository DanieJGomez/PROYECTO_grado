  <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
      <meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
      <title>Registrate | Colegio Técnico Jaime Pardo Leal</title>
      <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" href="{{ url_for('static', filename='ico/logo.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/barra.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registrate.css') }}">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>
  <header>
    <h1><a href="{{ url_for('home') }}">Colegio Técnico Jaime Pardo Leal </h1>
      <div class="barra">
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('home') }}"><i class='bx bx-home-alt'></i></a>
      </li>
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="{{ url_for('login') }}">Iniciar Sesión</a>
        <a href="{{ url_for('login') }}"><i class='bx bxs-key' ></i></a>
      </li> 
      <li>
         <a class="nav-link active" aria-current="page" href="{{ url_for('contactanos') }}">Contáctanos</a>
        <a href="{{ url_for('contactanos') }}"><i class='bx  bxs-envelope'  ></i> </a>
      </li>
      </div>
</header>
  <section class="form-registrer">
      <h4>Crea tu Cuenta</h4>
      <form action="{{ url_for('registro') }}" method="POST">
      <input class="controls" type="text" name="nombre" id="nombre" placeholder="Ingrese su Nombre" required>
      <input class="controls" type="text" name="apellido" id="Apellido" placeholder="Ingrese su Apellido" required>
      <label class="form-label">Tipo de usuario</label>
<select class="controls" name="tipo_usuario" id="TipoUsuario" required>
    <option value="acudiente">Acudiente/Tutor</option>
    <option value="estudiante">Estudiante</option>
</select>
      <input class="controls" type="email" name="correo" id="Correo" placeholder="Ingrese su Correo" required>
      <input class="controls" type="password" name="password" id="Contraseña" placeholder="Ingrese su Contraseña" required>
      <p>He leido y estoy de acuerdo con
          <a href="{{ url_for('terminos') }}">Terminos y Condiciones</a></p>
          <button type="submit" class="btn">Registrarse</button>
      <p><a href="{{ url_for('login') }}">Ya tengo cuenta</a></p>
      </form>
  </section>

  <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
  </body>
  </html>
