<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Reporte - Subir Acta PDF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/orientador.css') }}">
    <style>
        .reportes-container {
            min-height: 100vh;
            padding: 40px 20px;
            padding-top: 100px;
        }

        .reportes-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            margin: 0 auto;
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            max-width: 800px;
        }

        .reportes-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 3px solid #0d1e4c;
        }

        .reportes-header h1 {
            color: #0d1e4c;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .reportes-header p {
            color: #516f85;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            color: #0d1e4c;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #98a9b6;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0d1e4c;
            box-shadow: 0 0 0 3px rgba(13, 30, 76, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Área de subida de archivo */
        .file-upload-area {
            border: 3px dashed #98a9b6;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: rgba(152, 169, 182, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .file-upload-area:hover {
            border-color: #0d1e4c;
            background: rgba(13, 30, 76, 0.05);
        }

        .file-upload-area.dragover {
            border-color: #0d1e4c;
            background: rgba(13, 30, 76, 0.1);
            transform: scale(1.02);
        }

        .file-upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #516f85;
        }

        .file-upload-text {
            color: #0d1e4c;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .file-upload-hint {
            color: #516f85;
            font-size: 0.95rem;
        }

        .file-upload-input {
            display: none;
        }

        .file-selected {
            margin-top: 20px;
            padding: 15px;
            background: rgba(13, 30, 76, 0.1);
            border-radius: 10px;
            display: none;
        }

        .file-selected.show {
            display: block;
        }

        .file-selected-icon {
            font-size: 24px;
            margin-right: 10px;
        }

        .file-selected-name {
            color: #0d1e4c;
            font-weight: 600;
            font-size: 1rem;
        }

        .file-selected-size {
            color: #516f85;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .remove-file-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-left: 15px;
            transition: all 0.3s ease;
        }

        .remove-file-btn:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        /* Botones */
        .form-actions {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: center;
        }

        .btn {
            padding: 18px 45px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0d1e4c, #1a2d5a);
            color: #e5c9d7;
            box-shadow: 0 10px 25px rgba(13, 30, 76, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #1a2d5a, #2a3d6a);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(13, 30, 76, 0.4);
        }

        .btn-secondary {
            background: #98a9b6;
            color: white;
        }

        .btn-secondary:hover {
            background: #7a8d9a;
            transform: translateY(-3px);
        }

        /* Mensajes de alerta */
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }
        .footer-content {
            width: 100%;
            align-items: center;
        }    
        /* Responsive */
        @media (max-width: 768px) {
            .reportes-container {
                padding: 20px 10px;
                padding-top: 80px;
            }

            .reportes-card {
                padding: 30px 20px;
                border-radius: 15px;
            }

            .reportes-header h1 {
                font-size: 1.8rem;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .file-upload-area {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .reportes-header h1 {
                font-size: 1.5rem;
            }

            .reportes-card {
                padding: 25px 15px;
            }

            .btn {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }

        /* Animación */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reportes-card {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <header>
        <h1>📝 Sistema de Reportes</h1>
    </header>

    <div class="reportes-container">
        <div class="reportes-card">
            <div class="reportes-header">
                <h1>Crear Nuevo Reporte</h1>
                <p>Sube el acta en formato PDF con la información del reporte</p>
            </div>

            <div class="alert alert-success" id="alertSuccess">
                ✅ Reporte creado exitosamente
            </div>

            <div class="alert alert-error" id="alertError">
                ❌ Error al crear el reporte. Verifica los datos e intenta nuevamente.
            </div>

           <form action="/orientador/reportes/guardar" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label for="titulo">📋 Título del Reporte *</label>
                    <input type="text" id="titulo" name="titulo" required placeholder="Ej: Acta de Seguimiento Académico">
                </div>

                <div class="form-group">
                    <label for="tipo">📂 Tipo de Reporte *</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Seleccione un tipo</option>
                        <option value="seguimiento">Seguimiento Académico</option>
                        <option value="disciplinario">Disciplinario</option>
                        <option value="psicosocial">Psicosocial</option>
                        <option value="reunion">Reunión de Padres</option>
                        <option value="comite">Comité de Convivencia</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="estudiante">👤 Estudiante Involucrado</label>
                    <input type="text" id="estudiante" name="estudiante" placeholder="Nombre del estudiante o N/A">
                </div>

                <div class="form-group">
                    <label for="fecha">📅 Fecha del Reporte *</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>

                <div class="form-group">
                    <label for="descripcion">📝 Descripción Breve</label>
                    <textarea id="descripcion" name="descripcion" placeholder="Breve descripción del contenido del acta (opcional)"></textarea>
                </div>

                <div class="form-group">
                    <label for="pdf">📄 Subir Acta en PDF *</label>
                    
                    <div class="file-upload-area" id="fileUploadArea">
                        <div class="file-upload-icon">📄</div>
                        <div class="file-upload-text">Haz clic aquí o arrastra el archivo PDF</div>
                        <div class="file-upload-hint">Tamaño máximo: 10 MB | Solo archivos PDF</div>
                        <input type="file" id="pdf" name="pdf" accept=".pdf" class="file-upload-input" required>
                    </div>

                    <div class="file-selected" id="fileSelected">
                        <span class="file-selected-icon">📎</span>
                        <span class="file-selected-name" id="fileName"></span>
                        <span class="file-selected-size" id="fileSize"></span>
                        <button type="button" class="remove-file-btn" id="removeFileBtn">✕ Eliminar</button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Guardar Reporte</button>
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()">↩️ Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const fileUploadArea = document.getElementById('fileUploadArea');
        const fileInput = document.getElementById('pdf');
        const fileSelected = document.getElementById('fileSelected');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const removeFileBtn = document.getElementById('removeFileBtn');

        // Click en el área para abrir selector de archivos
        fileUploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Prevenir comportamiento por defecto del drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            fileUploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Resaltar área cuando se arrastra archivo
        ['dragenter', 'dragover'].forEach(eventName => {
            fileUploadArea.addEventListener(eventName, () => {
                fileUploadArea.classList.add('dragover');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            fileUploadArea.addEventListener(eventName, () => {
                fileUploadArea.classList.remove('dragover');
            });
        });

        // Manejar archivo soltado
        fileUploadArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect(files[0]);
            }
        });

        // Manejar archivo seleccionado
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            // Validar que sea PDF
            if (file.type !== 'application/pdf') {
                alert('⚠️ Por favor selecciona un archivo PDF válido');
                fileInput.value = '';
                return;
            }

            // Validar tamaño (10 MB)
            if (file.size > 10 * 1024 * 1024) {
                alert('⚠️ El archivo es demasiado grande. Máximo 10 MB');
                fileInput.value = '';
                return;
            }

            // Mostrar información del archivo
            fileName.textContent = file.name;
            fileSize.textContent = `(${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            fileSelected.classList.add('show');
        }

        // Eliminar archivo seleccionado
        removeFileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.value = '';
            fileSelected.classList.remove('show');
        });

        // Establecer fecha actual por defecto
        document.getElementById('fecha').valueAsDate = new Date();

        // Validación del formulario
        document.getElementById('reporteForm').addEventListener('submit', (e) => {
            if (!fileInput.files || fileInput.files.length === 0) {
                e.preventDefault();
                alert('⚠️ Por favor selecciona un archivo PDF para subir');
                return false;
            }
        });
    </script>
</body>
</html>
